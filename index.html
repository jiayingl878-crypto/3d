<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的 3D 模型作品</title>
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; background: #f4f4f4;">

    <h1>我的 3D 網站</h1>

    <h2>1. Sketchfab 模型</h2>
    <iframe style="width: 80%; height: 400px; border: none;" 
            src="https://sketchfab.com/models/YOUR_MODEL_ID/embed">
    </iframe>

    <h2>2. Babylon Viewer 模型 (本機檔案)</h2>
    <babylon model="models/my_model.glb" style="width: 80%; height: 400px; margin: 0 auto;"></babylon>

</body>
</html>
